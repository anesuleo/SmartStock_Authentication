name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Run tests ──────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v
        env:
          APP_ENV: test
          DATABASE_URL: sqlite:///file::memory:?cache=shared&uri=true

  # ── Build and push Docker image to GitHub Container Registry ──────────────
  # Only runs on pushes to master (not on pull requests)
  build-and-push:
    needs: test   # only build if tests pass
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write   # needed to push to ghcr.io

    steps:
      - uses: actions/checkout@v4

      # Log in to GitHub Container Registry using the built-in GITHUB_TOKEN
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build the Docker image and push it to ghcr.io
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Image will be available at:
          # ghcr.io/<your-github-username>/smartstock_authentication/auth:latest
          tags: ghcr.io/${{ github.repository_owner }}/smartstock_authentication/auth:latest